<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS1 Class</title>
    <style>
        .container{
            border: 2px solid blue;
            background-color: skyblue;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .name-title{
            text-align: center;
            color: blue;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .year-style{
            color: orange;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            border: 0.5px dotted red;
            border-radius: 50%;
            padding: 7px;
            font-size: medium;
            margin-left: 5px;
            background-color: rgb(218, 225, 227);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name-title">St Francis SS1 Class<span class="year-style">2028</span></h1>
    </div>
</body>
</html>
